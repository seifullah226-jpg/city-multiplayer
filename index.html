<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Гонки 10000км</title>
<style>
    body{margin:0;background:#000;overflow:hidden;font-family:Arial}
    canvas{display:block}
    #ui{position:absolute;top:10px;left:10px;color:white;font-size:22px;text-shadow:2px 2px 4px black;z-index:10}
    #progress{position:absolute;top:50px;left:10px;width:90%;max-width:400px;height:12px;background:#333;border-radius:6px;overflow:hidden;z-index:10}
    #progressBar{height:100%;width:0%;background:linear-gradient(90deg, lime, yellow);transition:width 0.3s}
    #menu{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#222;padding:30px;border-radius:15px;color:white;text-align:center}
    button{padding:12px 25px;font-size:20px;margin:8px;cursor:pointer;background:#0a0;color:white;border:none;border-radius:8px}
    button:hover{background:#0c0}
</style>
</head>
<body>
<div id="ui">
    <div id="score">Дистанция: 0.0 км / 10000 км</div>
    <div id="best">Рекорд: 0 км</div>
</div>
<div id="progress"><div id="progressBar"></div></div>
<div id="menu">
    <h2>Выбери скорость</h2>
    <button onclick="startGame(4)">Легко</button>
    <button onclick="startGame(6)">Средне</button>
    <button onclick="startGame(10)">Хард</button>
</div>
<canvas id="game"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let score = 0;
const FINISH_DISTANCE = 10000;
let distance = 0;
let bestScore = localStorage.getItem('best') || 0;
document.getElementById('best').innerText = bestScore + ' км';
let gameOver = false;
let gameStarted = false;
let speed = 5;
let isDrifting = false;
let keys = {};

window.addEventListener('keydown', e => keys[e.key] = true);
window.addEventListener('keyup', e => keys[e.key] = false);

let player = {x: canvas.width/2-20, y: canvas.height-100, w:40, h:70, color:'red'};
let roadLines = [];
let cars = [];
for(let i=0; i<20; i++) roadLines.push({y: i*60});

function spawnCar(){
    let lane = Math.floor(Math.random()*3);
    let x = (canvas.width/3 * lane) + canvas.width/6 - 20;
    cars.push({x: x, y: -100, w:40, h:70, color:'blue', speed: speed + Math.random()*2});
}
setInterval(spawnCar, 1200);

function startGame(s){
    speed = s;
    gameStarted = true;
    distance = 0;
    gameOver = false;
    cars = [];
    document.getElementById('menu').style.display = 'none';
    gameLoop();
}

function update(){
    if(!gameStarted || gameOver) return;

    // Управление
    if(keys['ArrowLeft'] || keys['a']) player.x -= 8;
    if(keys['ArrowRight'] || keys['d']) player.x += 8;
    player.x = Math.max(0, Math.min(canvas.width-player.w, player.x));
    
    isDrifting = keys['Shift'];

    // Дорога
    roadLines.forEach(l => {
        l.y += speed;
        if(l.y > canvas.height) l.y = -60;
    });

    // Машины
    cars.forEach((car, i) => {
        car.y += car.speed;
        if(car.y > canvas.height) cars.splice(i,1);
        // Столкновение
        if(player.x < car.x+car.w && player.x+player.w > car.x && player.y < car.y+car.h && player.y+player.h > car.y){
            gameOver = true;
            document.getElementById('menu').style.display = 'block';
            alert('АВАРИЯ! Проехал: ' + distance.toFixed(1) + ' км');
        }
    });

    // НАЧИСЛЕНИЕ ДИСТАНЦИИ
    let points = isDrifting ? 20 : 10;
    distance += points / 10; // 10 очков = 1 км
        // ОБНОВЛЯЕМ UI
    document.getElementById('score').innerText = `Дистанция: ${distance.toFixed(1)} км / ${FINISH_DISTANCE} км`;
    document.getElementById('progressBar').style.width = (distance / FINISH_DISTANCE * 100) + '%';

    // ПРОВЕРКА ФИНИША
    if(distance >= FINISH_DISTANCE){
        gameOver = true;
        if(distance > bestScore){
            bestScore = distance.toFixed(1);
            localStorage.setItem('best', bestScore);
            document.getElementById('best').innerText = bestScore + ' км';
        }
        document.getElementById('menu').style.display = 'block';
        alert("ФИНИШ! ПОБЕДА НА 10000км! 🏆");
    }
}

function draw(){
    // Фон дорога
    ctx.fillStyle = '#333';
    ctx.fillRect(0,0,canvas.width,canvas.height);
    
    // Полосы по середине
    ctx.fillStyle = 'white';
    roadLines.forEach(l => ctx.fillRect(canvas.width/2-5, l.y, 10, 40));

    // Машины
    cars.forEach(car => {
        ctx.fillStyle = car.color;
        ctx.fillRect(car.x, car.y, car.w, car.h);
    });

    // Игрок
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x, player.y, player.w, player.h);
}
function gameLoop(){
    update();
    draw();
    if(!gameOver) requestAnimationFrame(gameLoop);
}

window.addEventListener('resize', ()=>{
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
});
</script>
</body>
</html>
